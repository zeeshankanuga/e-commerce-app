apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: e-commerce-app
spec:
  serviceName: mongo-service
  replicas: 1
  selector:
    matchLabels:
      app: mongo

  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
      - name: mongo
        image: mongo:latest

        ports:
        - containerPort: 27017

        env:
        - name: MONGO_INITDB_DATABASE
          value: "ecommerce"

        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"

        volumeMounts:
        - name: mongo-storage
          mountPath: /data/db

  volumeClaimTemplates:
  - metadata:
      name: mongo-storage
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi