apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration-job
  namespace: e-commerce-app
spec:
  template:
    metadata:
      name: db-migration-job
    spec:
      containers:
        - name: db-migration
          image: zeeshankanuga/db-migration:10
          imagePullPolicy: Always
          env:
            - name: MONGO_URI
              value: "mongodb://mongo-service:27017/ecommerce"
      restartPolicy: OnFailure
