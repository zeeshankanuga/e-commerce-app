apiVersion: apps/v1
kind: daemonset
metadata:
  name: mongo-daemonset
  namespace: e-commerce-app
spec:
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
      - name: mongo-container
        image: mongo:latest
        volumeMounts:
        - name: e-commerce-app-volume
          mountPath: /data/db
        ports:
        - containerPort: 27017
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"
        env:
        - name: MONGO_INITDB_DATABASE
          value: "ecommerce"
      volumes:
      - name: e-commerce-app-volume
        persistentVolumeClaim:
          claimName: e-commerce-app-pvc

